<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F&U with SKT AICC</title>
    <style>
        /* 기본 여백 제거 및 화면 설정 */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
        }

        .container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        /* 배경 이미지 및 오버레이 */
        .bg-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            overflow: hidden;
        }

        .bg-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: blur(8px) brightness(0.7);
            transform: scale(1.05);
        }
        
        .bg-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.4); 
            z-index: 2;
        }

        /* 1. 메인 타이틀 (흰색, 3D 입체감 효과) */
        .title {
            position: absolute;
            top: 2%; /* 화면 최상단으로 이동 (기존 6% -> 2%) */
            width: 100%;
            text-align: center;
            z-index: 10;
            font-size: 5vw;
            font-weight: 900;
            margin: 0;
            letter-spacing: 3px;
            color: #ffffff;
            
            text-shadow: 
                0 1px 0 #cccccc, 
                0 2px 0 #c9c9c9, 
                0 3px 0 #bbbbbb, 
                0 4px 0 #b9b9b9, 
                0 5px 0 #aaaaaa, 
                0 6px 1px rgba(0,0,0,0.1), 
                0 0 5px rgba(0,0,0,0.1), 
                0 1px 3px rgba(0,0,0,0.3), 
                0 3px 5px rgba(0,0,0,0.2), 
                0 5px 10px rgba(0,0,0,0.25), 
                0 10px 10px rgba(0,0,0,0.2), 
                0 20px 20px rgba(0,0,0,0.15);
        }

        /* 중앙 영상 컨테이너 */
        .video-container {
            position: absolute;
            top: 55%; /* 중앙으로 조정하여 타이틀과 간격 확보 (기존 60% -> 55%) */
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85vw;
            height: 47.8125vw;
            max-height: 85vh;
            z-index: 5;
            background-color: #000;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.8), 0 0 30px rgba(82, 56, 223, 0.4);
            border: 1px solid rgba(245, 244, 252, 0.2);
        }

        /* 2. QR 코드 래퍼 (절대 위치 및 드래그 제어) */
        .qr-wrapper {
            position: absolute;
            top: 8%;
            right: 5%;
            z-index: 15;
            cursor: grab;
            user-select: none;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .qr-wrapper:active {
            cursor: grabbing;
        }

        /* 플로팅 애니메이션 전용 내부 래퍼 */
        .qr-floating-group {
            animation: float 4s ease-in-out infinite;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 강조된 QR 안내 뱃지 */
        .qr-badge {
            background: linear-gradient(135deg, #FF3366, #5238DF);
            color: #ffffff;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 1.4vw;
            font-weight: bold;
            margin-bottom: 12px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.4);
            white-space: nowrap;
            /* 시선을 끄는 펄스 애니메이션 */
            animation: pulse 2s infinite;
        }

        /* QR 이미지를 감싸는 강조 박스 */
        .qr-box {
            width: 12vw;
            max-width: 200px;
            background-color: rgba(255, 255, 255, 0.95);
            padding: 12px;
            border-radius: 20px;
            box-sizing: border-box;
            /* 네온 글로우 효과 및 입체감 */
            box-shadow: 0 0 25px rgba(82, 56, 223, 0.8), 0 10px 20px rgba(0, 0, 0, 0.5);
            border: 3px solid #5238DF;
        }

        .qr-code-img {
            width: 100%;
            display: block;
            border-radius: 10px;
            -webkit-user-drag: none;
        }

        /* 애니메이션 키프레임 */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        /* 재생 시작 오버레이 */
        .play-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #F5F4FC;
            font-size: 2.5vw;
            font-weight: bold;
            cursor: pointer;
            letter-spacing: 1px;
        }
        .play-overlay span {
            padding: 20px 40px;
            border: 2px solid #5238DF;
            border-radius: 50px;
            background-color: rgba(54, 23, 206, 0.3);
            transition: background-color 0.3s;
        }
        .play-overlay:hover span {
            background-color: rgba(54, 23, 206, 0.6);
        }
    </style>
</head>
<body>
    <div class="container" id="mainContainer">
        <!-- 클릭 유도 오버레이 -->
        <div class="play-overlay" id="playOverlay">
            <span>화면을 클릭하여 부스 디스플레이 시작</span>
        </div>

        <div class="bg-wrapper">
            <img src="background.png" alt="Background" class="bg-image" onerror="this.src='https://images.unsplash.com/photo-1550751827-4bd374c3f58b?q=80&w=1920&auto=format&fit=crop'">
            <div class="bg-overlay"></div>
        </div>
        
        <h1 class="title">F&U with SKT AICC</h1>
        
        <div class="video-container">
            <div id="mainVideo"></div>
        </div>
        
        <!-- QR 코드 영역: 안내 문구와 박스를 그룹화하여 디자인 적용 -->
        <div class="qr-wrapper" id="draggableQrWrapper">
            <div class="qr-floating-group">
                <div class="qr-badge">이벤트 참여하고 🎁경품🎁 받기!</div>
                <div class="qr-box">
                    <img src="qrcode.png" alt="QR Code" class="qr-code-img" onerror="this.src='https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=Placeholder'">
                </div>
            </div>
        </div>
    </div>

    <script>
        // 3. 유튜브 IFrame Player API - 다중 영상 연속 재생
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        var player;
        function onYouTubeIframeAPIReady() {
            // 영상 id 입력
            const videoId1 = 'uZadbAuGMDA'; 
            const videoId2 = 'dGxswvjfq_U'; 

            player = new YT.Player('mainVideo', {
                height: '100%',
                width: '100%',
                playerVars: {
                    'autoplay': 1,
                    'controls': 1, 
                    'rel': 0,
                    'modestbranding': 1,
                    'loop': 1,
                    'playlist': videoId1 + ',' + videoId2, 
                    'mute': 1
                },
                events: {
                    'onReady': onPlayerReady
                }
            });
        }

        function onPlayerReady(event) {
            event.target.playVideo();
        }

        // 오버레이 클릭 (소리 켜기)
        document.addEventListener("DOMContentLoaded", function() {
            const overlay = document.getElementById('playOverlay');
            overlay.addEventListener('click', function() {
                if (player && typeof player.unMute === 'function') {
                    player.unMute();
                    player.setVolume(100);
                }
                overlay.style.display = 'none';
            }, { once: true });
        });

        // QR 드래그 기능 (래퍼 기준 이동)
        const qrWrapper = document.getElementById('draggableQrWrapper');
        let isDragging = false;
        let startX, startY, initialX, initialY;

        qrWrapper.addEventListener('mousedown', dragStart);
        qrWrapper.addEventListener('touchstart', dragStart, {passive: false});

        function dragStart(e) {
            isDragging = true;
            const clientX = e.type === 'touchstart' ? e.touches[0].clientX : e.clientX;
            const clientY = e.type === 'touchstart' ? e.touches[0].clientY : e.clientY;

            initialX = qrWrapper.offsetLeft;
            initialY = qrWrapper.offsetTop;

            startX = clientX;
            startY = clientY;

            e.preventDefault(); 
        }

        document.addEventListener('mousemove', drag);
        document.addEventListener('touchmove', drag, {passive: false});

        function drag(e) {
            if (!isDragging) return;

            const clientX = e.type === 'touchmove' ? e.touches[0].clientX : e.clientX;
            const clientY = e.type === 'touchmove' ? e.touches[0].clientY : e.clientY;

            const dx = clientX - startX;
            const dy = clientY - startY;

            qrWrapper.style.left = (initialX + dx) + 'px';
            qrWrapper.style.top = (initialY + dy) + 'px';
            qrWrapper.style.right = 'auto'; // 초기 우측 정렬 속성 무효화
        }

        document.addEventListener('mouseup', dragEnd);
        document.addEventListener('touchend', dragEnd);

        function dragEnd() {
            isDragging = false;
        }
    </script>
</body>
</html>
