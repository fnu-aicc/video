<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F&U with SKT CCaaS</title>
    <style>
        /* 기본 여백 제거 및 화면 설정 */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
        }

        .container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        /* 배경 이미지 및 오버레이 */
        .bg-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            overflow: hidden;
        }

        .bg-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: blur(8px) brightness(0.7);
            transform: scale(1.05);
        }
        
        .bg-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.4); 
            z-index: 2;
        }

        /* 1. 메인 타이틀 (흰색, 3D 입체감 효과) */
        .title {
            position: absolute;
            top: 6%;
            width: 100%;
            text-align: center;
            z-index: 10;
            font-size: 5vw;
            font-weight: 900;
            margin: 0;
            letter-spacing: 3px;
            color: #ffffff; /* 흰색 글씨 */
            
            /* 다중 text-shadow를 이용한 3D 입체 효과 구현 */
            text-shadow: 
                0 1px 0 #cccccc, 
                0 2px 0 #c9c9c9, 
                0 3px 0 #bbbbbb, 
                0 4px 0 #b9b9b9, 
                0 5px 0 #aaaaaa, 
                0 6px 1px rgba(0,0,0,0.1), 
                0 0 5px rgba(0,0,0,0.1), 
                0 1px 3px rgba(0,0,0,0.3), 
                0 3px 5px rgba(0,0,0,0.2), 
                0 5px 10px rgba(0,0,0,0.25), 
                0 10px 10px rgba(0,0,0,0.2), 
                0 20px 20px rgba(0,0,0,0.15);
        }

        /* 중앙 영상 컨테이너 */
        .video-container {
            position: absolute;
            top: 54%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 70vw;
            height: 39.375vw;
            max-height: 70vh;
            z-index: 5;
            background-color: #000;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.8), 0 0 30px rgba(82, 56, 223, 0.4);
            border: 1px solid rgba(245, 244, 252, 0.2);
            pointer-events: none;
        }

        /* 2. QR 코드 래퍼 (드래그 담당) */
        .qr-wrapper {
            position: absolute;
            top: 8%;
            right: 5%;
            width: 12vw;
            max-width: 200px;
            z-index: 15;
            cursor: grab;
            user-select: none;
        }
        
        .qr-wrapper:active {
            cursor: grabbing;
        }

        /* QR 코드 이미지 (플로팅 애니메이션 담당) */
        .qr-code {
            width: 100%;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.6);
            background-color: rgba(255, 255, 255, 0.9);
            padding: 10px;
            box-sizing: border-box;
            -webkit-user-drag: none;
            /* 둥둥 떠다니는 애니메이션 추가 */
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }

        /* 재생 시작 오버레이 */
        .play-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #F5F4FC;
            font-size: 2.5vw;
            font-weight: bold;
            cursor: pointer;
            letter-spacing: 1px;
        }
        .play-overlay span {
            padding: 20px 40px;
            border: 2px solid #5238DF;
            border-radius: 50px;
            background-color: rgba(54, 23, 206, 0.3);
            transition: background-color 0.3s;
        }
        .play-overlay:hover span {
            background-color: rgba(54, 23, 206, 0.6);
        }
    </style>
</head>
<body>
    <div class="container" id="mainContainer">
        <!-- 클릭 유도 오버레이 -->
        <div class="play-overlay" id="playOverlay">
            <span>화면을 클릭하여 부스 디스플레이 시작</span>
        </div>

        <div class="bg-wrapper">
            <img src="background.png" alt="Background" class="bg-image" onerror="this.src='https://images.unsplash.com/photo-1550751827-4bd374c3f58b?q=80&w=1920&auto=format&fit=crop'">
            <div class="bg-overlay"></div>
        </div>
        
        <h1 class="title">F&U with SKT AICC</h1>
        
        <div class="video-container">
            <div id="mainVideo"></div>
        </div>
        
        <!-- 래퍼 영역(드래그)과 이미지 영역(플로팅) 분리 적용 -->
        <div class="qr-wrapper" id="draggableQrWrapper">
            <img src="qrcode.png" alt="QR Code" class="qr-code" onerror="this.src='https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=Placeholder'">
        </div>
    </div>

    <script>
        // 3. 유튜브 IFrame Player API - 다중 영상 연속 재생
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        var player;
        function onYouTubeIframeAPIReady() {
            // 영상 id 입력
            const videoId1 = 'uZadbAuGMDA'; // 첫 번째 영상 ID
            const videoId2 = 'uZadbAuGMDA'; // 두 번째 영상 ID

            player = new YT.Player('mainVideo', {
                height: '100%',
                width: '100%',
                // 첫 시작 비디오 ID는 생략하고 playlist로 한 번에 처리 가능함
                playerVars: {
                    'autoplay': 1,
                    'controls': 0,
                    'rel': 0,
                    'modestbranding': 1,
                    'loop': 1,
                    // ★핵심: 여러 영상을 쉼표로 연결하여 입력 (순차 재생 후 무한루프)
                    'playlist': videoId1 + ',' + videoId2, 
                    'mute': 1,
                    'disablekb': 1
                },
                events: {
                    'onReady': onPlayerReady
                }
            });
        }

        function onPlayerReady(event) {
            event.target.playVideo();
        }

        // 오버레이 클릭 (소리 켜기)
        document.addEventListener("DOMContentLoaded", function() {
            const overlay = document.getElementById('playOverlay');
            overlay.addEventListener('click', function() {
                if (player && typeof player.unMute === 'function') {
                    player.unMute();
                    player.setVolume(100);
                }
                overlay.style.display = 'none';
            }, { once: true });
        });

        // QR 드래그 기능 (래퍼 기준 이동)
        const qrWrapper = document.getElementById('draggableQrWrapper');
        let isDragging = false;
        let startX, startY, initialX, initialY;

        qrWrapper.addEventListener('mousedown', dragStart);
        qrWrapper.addEventListener('touchstart', dragStart, {passive: false});

        function dragStart(e) {
            isDragging = true;
            const clientX = e.type === 'touchstart' ? e.touches[0].clientX : e.clientX;
            const clientY = e.type === 'touchstart' ? e.touches[0].clientY : e.clientY;

            initialX = qrWrapper.offsetLeft;
            initialY = qrWrapper.offsetTop;

            startX = clientX;
            startY = clientY;

            e.preventDefault(); 
        }

        document.addEventListener('mousemove', drag);
        document.addEventListener('touchmove', drag, {passive: false});

        function drag(e) {
            if (!isDragging) return;

            const clientX = e.type === 'touchmove' ? e.touches[0].clientX : e.clientX;
            const clientY = e.type === 'touchmove' ? e.touches[0].clientY : e.clientY;

            const dx = clientX - startX;
            const dy = clientY - start

            qrWrapper.style.left = (initialX + dx) + 'px';
            qrWrapper.style.top = (initialY + dy) + 'px';
            qrWrapper.style.right = 'auto'; // 초기 우측 정렬 속성 무효화
        }

        document.addEventListener('mouseup', dragEnd);
        document.addEventListener('touchend', dragEnd);

        function dragEnd() {
            isDragging = false;
        }
    </script>
</body>
</html>
