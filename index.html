<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F&U with SKT CCaaS</title>
    <style>
        /* 기본 여백 제거 및 화면 꽉 차게 설정 */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
        }

        .container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        /* 1. 배경 이미지 개선: 블러 및 오버레이 */
        .bg-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            overflow: hidden;
        }

        .bg-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            /* 배경을 부드럽게 흐리게 처리하여 시선 분산 방지 */
            filter: blur(8px) brightness(0.7);
            transform: scale(1.05); /* 블러 처리 시 테두리 여백 생기는 것 방지 */
        }
        
        /* 배경 위에 어두운 막을 씌워 앞쪽 콘텐츠 강조 */
        .bg-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.4); 
            z-index: 2;
        }

        /* 2. 메인 타이틀 디자인 적용 */
        .title {
            position: absolute;
            top: 6%;
            width: 100%;
            text-align: center;
            z-index: 10;
            font-size: 4.8vw;
            font-weight: 900;
            margin: 0;
            letter-spacing: 2px;
            
            /* SKT 컬러를 활용한 텍스트 그라데이션 적용 */
            background: linear-gradient(to right, #5238DF, #3617CE, #8A74F9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            color: transparent; /* 웹킷 미지원 브라우저 대비 */
            
            /* 신비감을 위한 글로우 효과 (그라데이션 텍스트 주변 그림자) */
            filter: drop-shadow(0px 4px 10px rgba(82, 56, 223, 0.6)) 
                    drop-shadow(0px 0px 30px rgba(245, 244, 252, 0.2));
        }

        /* 중앙 영상 컨테이너 */
        .video-container {
            position: absolute;
            top: 54%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 70vw;
            height: 39.375vw; /* 16:9 비율 유지 */
            max-height: 70vh;
            z-index: 5;
            background-color: #000;
            border-radius: 20px;
            overflow: hidden;
            /* 영상 강조를 위한 SKT 컬러톤 글로우 박스 섀도우 */
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.8), 0 0 30px rgba(82, 56, 223, 0.4);
            border: 1px solid rgba(245, 244, 252, 0.2);
            pointer-events: none; /* 유튜브 클릭 방지 */
        }

        /* 3. 우측 상단 플로팅 QR 코드 (드래그 가능하도록 변경) */
        .qr-code {
            position: absolute;
            top: 8%;
            right: 5%;
            width: 12vw;
            max-width: 200px; /* 기존보다 살짝 줄여서 비율 맞춤 */
            z-index: 15;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.6);
            /* 드래그를 위해 플로팅 애니메이션은 제거하거나 약하게 적용 */
            cursor: grab; /* 마우스 올렸을 때 손바닥 모양 */
            /* 배경을 약간 투명한 하얀색으로 깔아 QR 가독성 확보 */
            background-color: rgba(255, 255, 255, 0.9);
            padding: 10px;
            box-sizing: border-box;
            user-select: none; /* 드래그 시 이미지 선택 방지 */
            -webkit-user-drag: none; /* 기본 브라우저 이미지 드래그 막기 */
        }
        
        /* 드래그 중일 때 커서 모양 변경 */
        .qr-code:active {
            cursor: grabbing;
        }

        /* 재생 시작 유도 오버레이 */
        .play-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #F5F4FC;
            font-size: 2.5vw;
            font-weight: bold;
            cursor: pointer;
            letter-spacing: 1px;
        }
        .play-overlay span {
            padding: 20px 40px;
            border: 2px solid #5238DF;
            border-radius: 50px;
            background-color: rgba(54, 23, 206, 0.3);
            transition: background-color 0.3s;
        }
        .play-overlay:hover span {
            background-color: rgba(54, 23, 206, 0.6);
        }
    </style>
</head>
<body>
    <div class="container" id="mainContainer">
        <!-- 클릭 유도 오버레이 -->
        <div class="play-overlay" id="playOverlay">
            <span>화면을 클릭하여 부스 디스플레이 시작</span>
        </div>

        <!-- 배경 영역 (이미지 + 오버레이 막) -->
        <div class="bg-wrapper">
            <img src="background.png" alt="Background" class="bg-image" onerror="this.src='https://images.unsplash.com/photo-1550751827-4bd374c3f58b?q=80&w=1920&auto=format&fit=crop'">
            <div class="bg-overlay"></div>
        </div>
        
        <!-- 디자인 적용된 메인 타이틀 -->
        <h1 class="title">F&U with SKT AICC</h1>
        
        <!-- 중앙 영상 컨테이너 -->
        <div class="video-container">
            <div id="mainVideo"></div>
        </div>
        
        <!-- 드래그 가능한 QR 코드 -->
        <img src="qrcode.png" alt="QR Code" class="qr-code" id="draggableQr" onerror="this.src='https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=Placeholder'">
    </div>

    <script>
        // 1. 유튜브 IFrame Player API 로드
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        var player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('mainVideo', {
                height: '100%',
                width: '100%',
                videoId: 'uZadbAuGMDA', 
                playerVars: {
                    'autoplay': 1,
                    'controls': 0,
                    'rel': 0,
                    'modestbranding': 1,
                    'loop': 1,
                    'playlist': 'uZadbAuGMDA', 
                    'mute': 1,
                    'disablekb': 1
                },
                events: {
                    'onReady': onPlayerReady
                }
            });
        }

        function onPlayerReady(event) {
            event.target.playVideo();
        }

        // 2. 화면 클릭 시 오버레이 제거 및 영상 소리 활성화 로직
        document.addEventListener("DOMContentLoaded", function() {
            const overlay = document.getElementById('playOverlay');
            
            // 오버레이 클릭 시에만 소리 켜짐 (QR코드 드래그 시 오작동 방지)
            overlay.addEventListener('click', function() {
                if (player && typeof player.unMute === 'function') {
                    player.unMute();
                    player.setVolume(100);
                }
                overlay.style.display = 'none';
            }, { once: true });
        });

        // 3. QR 코드 드래그(Drag and Drop) 로직
        const qrCode = document.getElementById('draggableQr');
        let isDragging = false;
        let startX, startY, initialX, initialY;

        // 마우스 누름 이벤트
        qrCode.addEventListener('mousedown', dragStart);
        // 터치 시작 이벤트 (모바일/터치스크린 대응)
        qrCode.addEventListener('touchstart', dragStart, {passive: false});

        function dragStart(e) {
            isDragging = true;
            
            // 터치 이벤트인지 마우스 이벤트인지 구분하여 좌표 획득
            const clientX = e.type === 'touchstart' ? e.touches[0].clientX : e.clientX;
            const clientY = e.type === 'touchstart' ? e.touches[0].clientY : e.clientY;

            // 현재 QR코드의 절대 위치 가져오기 (초기 top/right 속성 대신 offset 사용)
            initialX = qrCode.offsetLeft;
            initialY = qrCode.offsetTop;

            // 클릭한 시작 좌표
            startX = clientX;
            startY = clientY;

            // 기본 드래그 동작 방지
            e.preventDefault(); 
        }

        // 마우스/터치 이동 이벤트 (document에 걸어서 마우스가 요소를 벗어나도 드래그 유지)
        document.addEventListener('mousemove', drag);
        document.addEventListener('touchmove', drag, {passive: false});

        function drag(e) {
            if (!isDragging) return;

            const clientX = e.type === 'touchmove' ? e.touches[0].clientX : e.clientX;
            const clientY = e.type === 'touchmove' ? e.touches[0].clientY : e.clientY;

            // 이동한 거리 계산
            const dx = clientX - startX;
            const dy = clientY - startY;

            // 새 위치 계산 (화면 밖으로 나가지 않도록 제한 가능하나, 일단 자유롭게 설정)
            let newX = initialX + dx;
            let newY = initialY + dy;

            // style.right 대신 style.left와 top으로 위치 업데이트
            qrCode.style.left = newX + 'px';
            qrCode.style.top = newY + 'px';
            qrCode.style.right = 'auto'; // 기존 CSS의 right 속성 무효화
        }

        // 마우스/터치 뗌 이벤트
        document.addEventListener('mouseup', dragEnd);
        document.addEventListener('touchend', dragEnd);

        function dragEnd() {
            isDragging = false;
        }
    </script>
</body>
</html>
